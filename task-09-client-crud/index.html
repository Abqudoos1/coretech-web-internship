<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdul Qudoos | Client CRUD Architecture</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <header class="main-header">
            <h2>Enterprise Client Management System</h2>
            <p class="subtitle">LocalStorage Persistent CRUD State Machine</p>
        </header>

        <div class="dashboard-grid">
            <!-- Left Side: Form Panel -->
            <section class="form-panel">
                <h3 id="formTitle">Register New Client</h3>
                <form id="clientForm" novalidate>
                    <input type="hidden" id="clientId">
                    
                    <div class="form-group">
                        <label>Client Name</label>
                        <input type="text" id="clientName" placeholder="John Doe" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="clientEmail" placeholder="john@company.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="clientPhone" placeholder="e.g., +923000000000" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" id="clientCompany" placeholder="Apex Tech Ltd" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Project Type</label>
                        <input type="text" id="projectType" placeholder="E-Commerce / Web App" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Project Status</label>
                        <select id="projectStatus">
                            <option value="Pending">Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-primary">Save Client Record</button>
                    <button type="button" id="cancelBtn" class="btn-secondary hidden">Cancel Edit</button>
                </form>
            </section>

            <!-- Right Side: Data Grid & Controls -->
            <section class="data-panel">
                <div class="filter-bar">
                    <input type="text" id="searchClient" placeholder="Search by name, company, email...">
                    <select id="statusFilter">
                        <option value="All">All Statuses</option>
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Client & Company</th>
                                <th>Contact Details</th>
                                <th>Project Type</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="clientTableBody">
                            <!-- Injected dynamically via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
