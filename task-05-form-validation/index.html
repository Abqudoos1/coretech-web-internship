<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdul Qudoos | JS Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2>Contact Verification Hub</h2>
        <p class="subtitle">Secure Frontend Data Validation Interface</p>
        
        <!-- Success Alert Container -->
        <div id="successMessage" class="alert success-alert hidden">
            ✓ Form submitted successfully! Data passes validation.
        </div>

        <form id="contactForm" novalidate>
            <!-- Full Name -->
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
                <span class="error-msg" id="nameError"></span>
            </div>

            <!-- Email Address -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="example@domain.com">
                <span class="error-msg" id="emailError"></span>
            </div>

            <!-- Phone Number -->
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="Minimum 10 digits">
                <span class="error-msg" id="phoneError"></span>
            </div>

            <!-- Message Box -->
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" rows="4" placeholder="Minimum 20 characters required..."></textarea>
                <span class="error-msg" id="messageError"></span>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Execute Validation</button>
        </form>
    </div>

    <!-- Linking External JavaScript -->
    <script src="script.js"></script>
</body>
</html>
